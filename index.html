<!doctype html>
<html ng-app="myApp">
  <head>
    <meta charset="UTF-8" />
    <title>Reusable User Card Component</title>

    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body ng-controller="MainController">
    <h2>AngularJS Reusable Component (User Card)</h2>

    <div class="container">
      <!-- Same component reused multiple times -->

      <user-card name="aayu" age="22" city="Delhi" role="Frontend Developer" image="https://randomimageurl.com/assets/images/local/20260103_0546_Comical%20Canine%20Antics_simple_compose_01ke21r3vdecq8wy9eq7gpz3f0_compressed_q80.jpeg">
      </user-card>

      <user-card name="satyam" age="21" city="Mumbai" role="Backend Developer" image="https://images.unsplash.com/photo-1574144611937-0df059b5ef3e?ixid=M3w4MjcwNjd8MHwxfHNlYXJjaHw1fHxjYXR8ZW58MHx8fHwxNzg0MTA4MjU0fDA&ixlib=rb-4.1.0&fit=max&q=80">
      </user-card>

      <user-card name="kittu" age="23" city="Pune" role="Full Stack Developer" image="https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?ixid=M3w4MjcwNjd8MHwxfHNlYXJjaHwxfHxjYXR8ZW58MHx8fHwxNzg0MTA4MjU0fDA&ixlib=rb-4.1.0&fit=max&q=80">
      </user-card>

      <user-card name="krati" age="24" city="kota" role="MERN Developer" image="https://images.unsplash.com/photo-1573865526739-10659fec78a5?ixid=M3w4MjcwNjd8MHwxfHNlYXJjaHwyfHxjYXR8ZW58MHx8fHwxNzg0MTA4MjU0fDA&ixlib=rb-4.1.0&fit=max&q=80">
      </user-card>
    </div>

    <script>
      var app = angular.module("myApp", []);

      app.controller("MainController", function ($scope) {});

      app.directive("userCard", function () {
        return {
          restrict: "E",

          scope: {
            name: "@",

            age: "@",

            city: "@",

            role: "@",
            
            image: "@"
          },

          template: `

        <div class="card">
            <img ng-src="{{image}}"alt="{{name}}'s" Avatar>

            <h3>{{name}}</h3>

            <p><b>Age :</b> {{age}}</p>

            <p><b>City :</b> {{city}}</p>

            <p><b>Role :</b> {{role}}</p>

            <button ng-click="showMessage()">
                View Profile
            </button>

        </div>
        `,

          link: function (scope) {
            scope.showMessage = function () {
              alert(
                "Name : " +
                  scope.name +
                  "\nAge : " +
                  scope.age +
                  "\nCity : " +
                  scope.city +
                  "\nRole : " +
                  scope.role,
              );
            };
          },
        };
      });
    </script>
  </body>
</html>
